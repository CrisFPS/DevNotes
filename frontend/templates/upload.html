{% extends "base.html" %}
{% block title %}Upload de arquivo — DevNotes Local{% endblock %}

{% block content %}
<h1>Upload de arquivo</h1>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<p>
    Extensões aceitas:
    <strong>{{ config.get('extensoes_aceitas', []) | join(', ') }}</strong>
    — Tamanho máximo: <strong>12 MB</strong>
</p>

<form method="post" action="/upload" enctype="multipart/form-data">
    <div class="form-group">
        <label for="file">Arquivo *</label>
        <input type="file" id="file" name="file" required>
    </div>

    <div class="form-group">
        <label for="title">Título (opcional — usa nome do arquivo se vazio)</label>
        <input type="text" id="title" name="title">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="category">Categoria</label>
            <select id="category" name="category">
                <option value="">— Selecione —</option>
                {% for cat in config.get('categorias', []) %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="system">Sistema</label>
            <select id="system" name="system">
                <option value="">— Selecione —</option>
                {% for sys in config.get('sistemas', []) %}
                <option value="{{ sys }}">{{ sys }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="domain">Domínio</label>
            <select id="domain" name="domain">
                <option value="">— Selecione —</option>
                {% for dom in config.get('dominios', []) %}
                <option value="{{ dom }}">{{ dom }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="tags">Tags (separadas por vírgula)</label>
        <input type="text" id="tags" name="tags">
    </div>

    <div class="form-group form-check">
        <input type="checkbox" id="is_business_rule" name="is_business_rule" value="true">
        <label for="is_business_rule">Marcar como Regra de Negócio</label>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn">Enviar arquivo</button>
        <a href="/" class="btn btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
